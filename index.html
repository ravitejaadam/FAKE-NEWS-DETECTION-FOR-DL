<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake News Detection using Deep Learning</title>
  <meta name="description" content="AI-powered fake news detection dashboard with confidence scoring and interactive sample analysis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>
  <div class="background-glow glow-3"></div>
  <div class="particle-layer" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="glass-card floating-card" aria-labelledby="page-title">
      <header class="hero">
        <p class="eyebrow">AI-Powered Misinformation Intelligence</p>
        <h1 id="page-title" class="typing-title">
          Fake News Detection using Deep Learning
        </h1>
        <p class="subtitle">
          Paste a news article below and let the model classify it as <strong>REAL</strong> or <strong>FAKE</strong> with a confidence score.
        </p>
      </header>

      <section class="input-section" aria-label="Article input">
        <label class="section-label" for="news-input">News Article</label>
        <textarea
          id="news-input"
          class="news-textarea"
          placeholder="Paste a complete news article here for AI analysis..."
          rows="10"
          maxlength="6000"
        ></textarea>
        <div class="input-meta">
          <span id="char-counter" class="char-counter">0 / 6000 characters</span>
        </div>
      </section>

      <section class="sample-section" aria-label="Sample articles">
        <p class="section-label">Try with samples</p>
        <div class="button-group">
          <button id="load-real" class="btn btn-secondary" type="button">Load Real News Sample</button>
          <button id="load-fake" class="btn btn-secondary" type="button">Load Fake News Sample</button>
        </div>
      </section>

      <section class="action-section" aria-label="Actions">
        <div class="button-group">
          <button id="analyze-btn" class="btn btn-primary" type="button">
            <span class="btn-text">Analyze</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
          <button id="clear-btn" class="btn btn-ghost" type="button">Clear</button>
        </div>
      </section>

      <section id="result-section" class="result-section hidden" aria-live="polite">
        <div class="result-header">
          <h2>Prediction Result</h2>
          <span id="result-badge" class="prediction-badge">--</span>
        </div>
        <p class="result-line">
          Prediction:
          <strong id="prediction-text">--</strong>
        </p>
        <p class="result-line">
          Confidence:
          <strong id="confidence-text">0%</strong>
        </p>
        <div class="progress-wrap" role="progressbar" aria-label="Confidence score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="confidence-bar" class="progress-bar"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
